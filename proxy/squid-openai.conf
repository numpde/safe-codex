visible_hostname safe-codex-proxy
http_port 3128
pid_filename /tmp/squid.pid

cache deny all
access_log none
cache_log /dev/null

acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

acl local_or_private_dst dst 0.0.0.0/8
acl local_or_private_dst dst 10.0.0.0/8
acl local_or_private_dst dst 100.64.0.0/10
acl local_or_private_dst dst 127.0.0.0/8
acl local_or_private_dst dst 169.254.0.0/16
acl local_or_private_dst dst 172.16.0.0/12
acl local_or_private_dst dst 192.168.0.0/16
acl local_or_private_dst dst 224.0.0.0/4
acl local_or_private_dst dst 240.0.0.0/4
acl local_or_private_dst dst ::1/128
acl local_or_private_dst dst fc00::/7
acl local_or_private_dst dst fe80::/10

# Stricter profile for API-key based Codex use. Add domains here if your
# workflow needs package registries, git hosts, or MCP servers.
acl allowed_domains dstdomain openai.com chatgpt.com oaistatic.com oaiusercontent.com

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny local_or_private_dst
http_access allow allowed_domains
http_access deny all

forwarded_for delete
request_header_access X-Forwarded-For deny all
request_header_access Cache-Control deny all
